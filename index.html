<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokemon Finder</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:white;
}

/* HEADER */

.hd{
height:70px;
display:flex;
align-items:center;
padding-left:40px;
background:rgb(226, 111, 69);
color:white;
}

/* HERO SECTION */

.hero{
min-height:90vh;
display:flex;
align-items:center;
justify-content:space-between;
padding:60px;
position:relative;
overflow:hidden;
}

/* TEXT AREA */

.text{
width:50%;
z-index:2;
}

.text h1{
font-size:60px;
color:red;
margin-bottom:10px;
}

.text h2{
color:orange;
margin-bottom:20px;
}

.text p{
font-size:18px;
line-height:1.6;
color:#444;
margin-bottom:30px;
}

/* BUTTON */

.btn{
padding:14px 28px;
border:none;
background:linear-gradient(90deg, red, orange);
color:white;
font-size:16px;
border-radius:30px;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
}

/* IMAGE AREA */

.image{
position:absolute;
right:0;
top:0;
height:100%;
width:60%;
display:flex;
align-items:center;
justify-content:flex-end;
}

.image img{
height:90%;
object-fit:contain;

mask-image: linear-gradient(to left, black 60%, transparent 100%);
-webkit-mask-image: linear-gradient(to left, black 60%, transparent 100%);
}

/* SEARCH SECTION */

.search{
max-width:500px;
margin:80px auto;
padding:40px;
text-align:center;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
border-top:5px solid red;
}

.search h1{
font-size:32px;
margin-bottom:25px;
background:white;
color:orangered;
}

/* INPUT */

.search input{
width:100%;
padding:12px;
border:2px solid orange;
border-radius:30px;
font-size:16px;
margin-bottom:20px;
outline:none;
}

/* BUTTON */

.search button{
padding:12px 25px;
border:none;
border-radius:30px;
background:linear-gradient(90deg, red, orange);
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.search button:hover{
transform:scale(1.05);
}

/* RESULT AREA */

#result{
margin-top:30px;
}

/* ---------- MOBILE RESPONSIVE ---------- */

@media (max-width:900px){

.hero{
flex-direction:column;
text-align:center;
padding:40px 20px;
}

.text{
width:100%;
}

.text h1{
font-size:40px;
}

.image{
position:relative;
width:100%;
margin-top:30px;
justify-content:center;
}

.image img{
height:250px;
mask-image:none;
-webkit-mask-image:none;
}

}

/* SMALL MOBILE */

@media (max-width:500px){

.hd{
justify-content:center;
padding-left:0;
}

.text h1{
font-size:32px;
}

.text p{
font-size:16px;
}

.search{
margin:50px 15px;
padding:30px 20px;
}

}
</style>
</head>

<body>

<header class="hd">
<h1>Pokemon Finder</h1>
</header>

<section class="hero">

<div class="text">
<h1>Pokemon Finder</h1>

<h2>Find Any Pokemon You Want</h2>

<p>
Search all types of pokemon like fire, water, grass,
ghost and many more. Discover their stats, abilities
and evolution.
</p>

<button class="btn">Search Pokemon</button>

</div>

<div class="image">
<img src="pkm.jpg">
</div>

</section>

<div class="search">
    <h1>Find-it!</h1>
     <input type="text" id="pokemonName" placeholder="type your pokemon name"/>
     <button onclick="getPokemon()">seacrh</button>
     <div id="result"></div>
</div>

</body>
<script>
   function getPokemon(){

let name = document.getElementById("pokemonName").value;

fetch("https://pokeapi.co/api/v2/pokemon/" + name)

.then(function(response){
return response.json();
})

.then(function(data){

document.getElementById("result").innerHTML = `

<h1>${data.name}</h1>

<img src="${data.sprites.front_default}"/>

<h3>Height: ${data.height}</h3>

<h3>Weight: ${data.weight}</h3>

<h3>Ability: ${data.abilities[0].ability.name}</h3>

<h3>Type: ${data.types[0].type.name}</h3>

`;

})

.catch(function(){
alert("Pokemon not found");
});

}
</script>
</html>
